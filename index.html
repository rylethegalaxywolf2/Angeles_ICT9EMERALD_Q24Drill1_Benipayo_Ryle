<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Q4 Drill 1</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* background */

body{
    background: linear-gradient(135deg,#b8b89f,#c9c9aa);
    font-family: Arial, sans-serif;
}

/* main box */

.classifier-box{
    background:#1c232b;
    border-radius:25px;
    padding:20px;
    width:500px;
    margin:100px auto;
    display:flex;
    align-items:center;
    gap:15px;
    color:white;
}

/* input */

input{
    width:200px;
    border-radius:5px;
    border:none;
    padding:5px;
}

/* button */

.btn-custom{
    background:#ffc107;
    color:black;
    font-weight:bold;
}

.btn-custom:hover{
    background:#e0a800;
}

/* error text */

#error{
    color:red;
    font-size:14px;
    margin-left:10px;
}

</style>
</head>

<body>

<h2 class="text-center mt-4">Electricity Consumption Classifier</h2>
<p class="text-center">Enter your kWh usage to classify your electricity consumption.</p>

<div class="classifier-box">

<h4>kWh</h4>

<input type="number" id="kwh" placeholder="Enter kWh">

<button class="btn btn-custom" onclick="classify()">Consumption Classification</button>

<span id="error"></span>

</div>

<script>

// function to classify electricity usage
function classify(){

// get input value
let kwh = Number(document.getElementById("kwh").value);

// error message element
let error = document.getElementById("error");

// reset error
error.textContent = "";

// check if negative or zero
if(kwh <= 0){
error.textContent = "Please input a non-negative number.";
return;
}

// classification
if(kwh <= 100){
alert("Lifeline Consumer: Discounted electricity rates.");
}
else if(kwh <= 200){
alert("Low Consumption: Normal residential rate.");
}
else if(kwh <= 300){
alert("Average Consumption: Typical electricity usage.");
}
else if(kwh <= 500){
alert("High Consumption: Higher electricity usage.");
}
else{
alert("Very High Consumption: Heavy electricity users.");
}

}

</script>

</body>
</html>
